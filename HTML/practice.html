<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>grid practice</title>
    <style>
      body{
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-areas: none
        "navbar navbar"
        "sidebar main"
        "sidebar footer";
      }
      nav{
        grid-area: navbar;
      }
      aside{
        grid-area: sidebar;
      }
      main{
        grid-area: main;
      }
      footer{
        grid-area: footer;
      }
    </style>
  </head>
  <body>
    <nav>navigation bar</nav>
    <aside>sidevar</aside>
    <main>main-content</main>
    <footer>footer</footer>
  </body>
</html>
