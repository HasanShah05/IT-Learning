<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form</title>
    <link rel="stylesheet" href="/CSS/form.css" />
  </head>

  <body
    style="
      background: url('/HTML/Assets/img_lights.jpg') no-repeat center fixed;
      background-size: cover;
    "
  >
    <div class="header">
      <h1>FORM</h1>
    </div>
    <div class="divo">
      <form action="" method="get">
        <fieldset>
          <legend>Basic Form</legend>
          <label for="Username">Enter Username</label><br />
          <input type="text" name="Name" id="Username" /><br />
          <label for="pass">Enter Password</label><br />
          <input type="password" name="pass" id="pass" /><br /><br />
          <input type="radio" name="coding" id="html" value="HTML" />
          <label for="html">HTML</label><br />
          <input type="radio" name="coding" id="css" value="CSS" />
          <label for="css">CSS</label><br />
          <input type="radio" name="coding" id="java" value="JAVA" />
          <label for="java">JAVA</label><br /><br />
          <input type="checkbox" name="vehicle1" id="vehicle1" value="BIKE" />
          <label for="vehicle1">BIKE</label><br />
          <input type="checkbox" name="vehicle2" id="vehicle2" value="CAR" />
          <label for="vehicle2">CAR</label><br />
          <input
            type="checkbox"
            name="vehicle3"
            id="vehicle3"
            value="SCOOTER"
          />
          <label for="vehicle3">SCOOTER</label><br /><br />
          <input type="submit" value="Submision" />
          <input type="reset" value="Reload" />
        </fieldset>
      </form>
      <br /><br />
    </div>

    <div class="elements">
      <form action="">
        <fieldset>
          <legend>Elements in Form</legend>
          <label for="cars">Choose A Car Brand</label>
          <select name="cars" id="cars">
            <option value="Honda">Honda</option>
            <option value="Volov">Volvo</option>
            <option value="BMW">BMW</option>
            <option value="Poersche">Poersche</option></select
          ><br /><br />
          <textarea name="mesage" cols="15" rows="5" autofocus>
        This is the text area
      </textarea
          ><br /><br />
          <button onclick="alert('It Means this working')">Clcke me</button>
          <input list="Browsers" />
          <datalist id="Browsers">
            <option value="Brave">Brave</option>
            <option value="Firefox">Firefox</option>
            <option value="Edge">Edge</option>
          </datalist>
        </fieldset>
      </form>
    </div>
    <div class="inputype">
      <form action="">
        <fieldset>
          <legend>Input Types</legend>
          <input type="color" name="favcolor" id="" />
          <input type="date" /><br />
          <input type="datetime-local" name="" id="" /><br />
          <input type="email" /><br />
          <input
            type="image"
            src="/Assets/w3img.webp"
            alt="wschool"
            width="20px"
            height="20px"
          /><br />
          <input type="file" name="" id="" />
          <input type="range" /><br />
          <input type="tel" name="" id="" pattern="[0-9]{2}-[0-9]{10}" />
        </fieldset>
      </form>
    </div>
    <br /><br /><b
      >rb
      <br /><br /><br /><br /><br /><br /><br /><br /><br /><br /><br /><br />
    </b>
  </body>
</html>
