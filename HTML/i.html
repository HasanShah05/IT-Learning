<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fylo Data Storage Component</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gradient: linear-gradient(90deg, hsl(6, 100%, 80%), hsl(335, 100%, 65%));
            --pale-blue: hsl(243, 100%, 93%);
            --grayish-blue: hsl(229, 7%, 55%);
            --dark-blue: hsl(228, 56%, 26%);
            --very-dark-blue: hsl(229, 57%, 11%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Raleway', sans-serif;
            font-size: 14px;
            color: var(--pale-blue);
            background-color: var(--very-dark-blue);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            
            /* Background image setup */
            background-image: url('https://i.ibb.co/Xp1d4g0/bg-desktop.png');
            background-repeat: no-repeat;
            background-position: bottom center;
            background-size: 100% 50vh;
        }

        .storage-component {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 2rem;
            align-items: flex-end;
            max-width: 920px;
            width: 100%;
        }

        /* --- Left Card (Logo & Icons) --- */
        .fylo-card {
            background-color: var(--dark-blue);
            padding: 2.5rem;
            border-radius: 10px 100px 10px 10px;
        }
        
        .fylo-logo {
            margin-bottom: 2rem;
        }

        .icon-group {
            display: flex;
            gap: 1rem;
        }

        .icon-box {
            background-color: var(--very-dark-blue);
            width: 50px;
            height: 50px;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- Right Card (Storage Info) --- */
        .storage-card {
            background-color: var(--dark-blue);
            padding: 2.5rem;
            border-radius: 10px;
            position: relative;
        }

        .storage-text {
            margin-bottom: 1rem;
        }
        
        .storage-text strong {
            font-weight: 700;
        }
        
        /* Progress Bar */
        .progress-bar-container {
            height: 20px;
            background-color: hsla(229, 57%, 11%, 0.5);
            border-radius: 10px;
            padding: 3px;
        }
        
        .progress-bar {
            height: 100%;
            width: 81.5%; /* Represents 815 GB used */
            background-image: var(--gradient);
            border-radius: 8px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding-right: 2px;
        }

        .progress-handle {
            width: 12px;
            height: 12px;
            background-color: white;
            border-radius: 50%;
        }
        
        /* Labels for the progress bar */
        .storage-labels {
            display: flex;
            justify-content: space-between;
            font-weight: 700;
            font-size: 0.8rem;
            margin-top: 0.5rem;
        }

        /* --- Storage Left Bubble --- */
        .storage-left-bubble {
            position: absolute;
            top: -45px;
            right: 2.5rem;
            background-color: white;
            color: var(--very-dark-blue);
            padding: 1rem 1.5rem;
            border-radius: 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .storage-left-bubble .number {
            font-size: 2.5rem;
            font-weight: 700;
        }

        .storage-left-bubble .unit {
            color: var(--grayish-blue);
            font-weight: 700;
            text-transform: uppercase;
        }

        /* Triangle for the bubble */
        .storage-left-bubble::after {
            content: '';
            position: absolute;
            bottom: 20px;
            right: 0;
            width: auto;
            height: auto;
            border-top: 20px solid white;
            border-left: 20px solid transparent;
        }

        /* --- Responsive Design for Mobile --- */
        @media (max-width: 800px) {
            body {
                background-image: url('https://i.ibb.co/hM9b1X2/bg-mobile.png');
                background-size: cover;
            }
            .storage-component {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
            .storage-left-bubble {
                top: auto;
                bottom: -35px;
                left: 50%;
                transform: translateX(-50%);
                border-radius: 10px;
            }
            .storage-left-bubble::after {
                display: none; /* Hide the triangle on mobile */
            }
        }
    </style>
</head>

            </div>
            <div class="icon-group">
                <div class="icon-box">

                <div class="icon-box">
                    <svg width="22" height="16" xmlns="http://www.w3.org/2000/svg"><path d="M19.426 6.018H17.82a4.85 4.85 0 0 0-4.74-3.527V0L8.853 4.226l4.226 4.226V5.987a2.474 2.474 0 0 1 2.392 1.95h-1.92a.485.485 0 0 0-.485.485v2.91a.485.485 0 0 0 .485.485h1.92A2.474 2.474 0 0 1 13.08 13.8h-2.148a4.85 4.85 0 0 0-4.74-3.527V7.55L1.966 11.777l4.226 4.226V13.54a2.474 2.474 0 0 1 2.392-1.95h1.92a.485.485 0 0 0 .485-.485v-2.91a.485.485 0 0 0-.485-.485h-1.92a2.474 2.474 0 0 1-2.392-1.95h2.148a4.85 4.85 0 0 0 4.74 3.527v2.466l4.226-4.226-4.226-4.226v2.466z" fill="#0C122C" fill-rule="nonzero"/></svg>
                </div>
            </div>
        </div>
        
        <div class="storage-card">
            <p class="storage-text">You’ve used <strong>815 GB</strong> of your storage</p>
            
            <div class="progress-bar-container">
                <div class="progress-bar">
                    <div class="progress-handle"></div>
                </div>
            </div>

            <div class="storage-labels">
                <span>0 GB</span>
                <span>1000 GB</span>
            </div>
            
            <div class="storage-left-bubble">
                <span class="number">185</span>
                <span class="unit">GB Left</span>
            </div>
        </div>
    </main>
</body>
</html>
