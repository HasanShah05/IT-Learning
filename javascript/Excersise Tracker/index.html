<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevTracker - Select Path</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1>Choose Your Path</h1>
        <p>Select a technology to view your progress roadmap.</p>
      </header>

      <div class="card-grid">
        <a href="./html/index.html" class="card html-card">
          <div class="icon-container">
            <i class="fa-brands fa-html5"></i>
            <i class="fa-brands fa-css3-alt"></i>
          </div>
          <h2>HTML & CSS</h2>
          <p>Master the structure and style of the web.</p>
          <span class="btn-text"
            >Track Progress <i class="fa-solid fa-arrow-right"></i
          ></span>
        </a>

        <a href="./javascript/index.html" class="card js-card">
          <div class="icon-container">
            <i class="fa-brands fa-js"></i>
          </div>
          <h2>JavaScript</h2>
          <p>Learn the logic and interactivity of the web.</p>
          <span class="btn-text"
            >Track Progress <i class="fa-solid fa-arrow-right"></i
          ></span>
        </a>
      </div>
    </main>
  </body>
</html>
