<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="src/output.css">

    <title>Frontend Mentor | Blog preview card</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <!-- <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style> -->
  </head>
  <body class="bg-[hsl(47,88%,63%)] text-[16px] flex justify-center items-center min-h-screen ">
    <div class="main-card max-w-[320px] bg-white p-5 rounded-xl border border-black shadow-[10px_10px_0px_black]">
      <div class="headpic">
        <img src="assets/images/illustration-article.svg" alt="card image" class="rounded-xl"/>
      </div>

      <div class="section bg-amber-300 size-max p-1 rounded-xs text-[0.8rem] font-bold mt-4 mb-2">Learning</div>

      <div class="date text-[0.8rem] text-gray-900 font-medium">Published 21 Dec 2023</div>

      <h3 class="heading text-[1.2rem] font-bold mt-4 hover:text-amber-300">HTML & CSS foundations</h3>

      <p class="defination text-gray-500 text-[0.8rem] mt-4 mb-4 font-medium">
        These languages are the backbone of every website, defining structure,
        content, and presentation.
      </p>

      <div class="profile flex items-center gap-3">
        <div class="pic">
          <img
            src="assets/images/image-avatar.webp"
            alt="creator profile image"
            class="w-[33px]"
          />
        </div>
        <p class="font-bold text-[0.8rem]">Greg Hooper</p>
      </div>
    </div>
    <!-- <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </div> -->
  </body>
</html>
