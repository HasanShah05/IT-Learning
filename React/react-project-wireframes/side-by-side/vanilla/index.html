<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vanilla JS - My Favorite Things</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 20px;
    }

    .app {
      background: #fff;
      border-radius: 20px;
      padding: 32px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
    }

    .badge {
      display: inline-block;
      background: #667eea;
      color: #fff;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 12px;
    }

    h1 {
      font-size: 24px;
      color: #1a1a2e;
      margin-bottom: 4px;
    }

    .count {
      color: #888;
      font-size: 14px;
      margin-bottom: 24px;
    }

    /* --- Form --- */
    .add-form {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .add-form input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .add-form input:focus {
      border-color: #667eea;
    }

    .add-form button {
      padding: 12px 20px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .add-form button:hover { background: #5a6fd6; }

    /* --- List --- */
    .list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .list li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      background: #f8f8fc;
      border-radius: 12px;
      font-size: 15px;
      color: #333;
      animation: slideIn 0.25s ease;
    }

    .list li .emoji { margin-right: 10px; font-size: 18px; }

    .list li button {
      background: none;
      border: none;
      color: #ccc;
      font-size: 18px;
      cursor: pointer;
      padding: 0 4px;
      transition: color 0.2s;
    }

    .list li button:hover { color: #e74c3c; }

    .empty {
      text-align: center;
      color: #bbb;
      padding: 32px 0;
      font-size: 15px;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* --- Code hint --- */
    .code-hint {
      margin-top: 24px;
      padding: 16px;
      background: #f0f0f5;
      border-radius: 12px;
      font-size: 12px;
      color: #666;
      line-height: 1.6;
    }
    .code-hint strong { color: #e74c3c; }
  </style>
</head>
<body>
  <div class="app">
    <span class="badge">VANILLA JS</span>
    <h1>My Favorite Things</h1>
    <p class="count" id="count">0 items</p>

    <form class="add-form" id="addForm">
      <input type="text" id="input" placeholder="Add something you love..." />
      <button type="submit">Add</button>
    </form>

    <ul class="list" id="list"></ul>
    <p class="empty" id="empty">No favorites yet. Add one!</p>

    <div class="code-hint">
      <strong>How Vanilla JS works:</strong><br />
      We manually find elements with <strong>getElementById</strong>,
      then manually create, update, and remove HTML elements
      with <strong>createElement</strong>, <strong>appendChild</strong>,
      and <strong>removeChild</strong>. WE do all the work!
    </div>
  </div>

  <script>
    // ==============================
    //  ALL THE DATA (our "state")
    // ==============================
    const emojis = ['⭐', '🎵', '🍕', '🎮', '📚', '🏀', '🎨', '🌈', '🐶', '🚀'];
    let favorites = [];

    // ==============================
    //  FIND ALL THE HTML ELEMENTS
    //  (we have to do this manually)
    // ==============================
    const form = document.getElementById('addForm');
    const input = document.getElementById('input');
    const listEl = document.getElementById('list');
    const countEl = document.getElementById('count');
    const emptyEl = document.getElementById('empty');

    // ==============================
    //  RENDER THE ENTIRE LIST
    //  (we have to rebuild it ourselves)
    // ==============================
    function renderList() {
      // Step 1: Clear everything
      listEl.innerHTML = '';

      // Step 2: Update the count text
      countEl.textContent = favorites.length + ' item' + (favorites.length !== 1 ? 's' : '');

      // Step 3: Show or hide the empty message
      emptyEl.style.display = favorites.length === 0 ? 'block' : 'none';

      // Step 4: Create a <li> for EACH favorite, one by one
      favorites.forEach(function (fav, index) {
        // Create the <li>
        const li = document.createElement('li');

        // Create the text part
        const span = document.createElement('span');
        span.innerHTML = '<span class="emoji">' + fav.emoji + '</span>' + fav.name;

        // Create the delete button
        const btn = document.createElement('button');
        btn.textContent = '✕';
        btn.addEventListener('click', function () {
          removeFavorite(index);
        });

        // Put them together
        li.appendChild(span);
        li.appendChild(btn);
        listEl.appendChild(li);
      });
    }

    // ==============================
    //  ADD A FAVORITE
    // ==============================
    function addFavorite(name) {
      const randomEmoji = emojis[Math.floor(Math.random() * emojis.length)];
      favorites.push({ name: name, emoji: randomEmoji });
      renderList(); // <-- must manually re-render!
    }

    // ==============================
    //  REMOVE A FAVORITE
    // ==============================
    function removeFavorite(index) {
      favorites.splice(index, 1);
      renderList(); // <-- must manually re-render!
    }

    // ==============================
    //  LISTEN FOR FORM SUBMIT
    // ==============================
    form.addEventListener('submit', function (e) {
      e.preventDefault();
      const name = input.value.trim();
      if (name) {
        addFavorite(name);
        input.value = '';
        input.focus();
      }
    });

    // Initial render
    renderList();
  </script>
</body>
</html>
