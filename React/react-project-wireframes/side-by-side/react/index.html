<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>React - My Favorite Things</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #f093fb, #f5576c);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 20px;
    }

    .app {
      background: #fff;
      border-radius: 20px;
      padding: 32px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
    }

    .badge {
      display: inline-block;
      background: #f5576c;
      color: #fff;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 12px;
    }

    h1 {
      font-size: 24px;
      color: #1a1a2e;
      margin-bottom: 4px;
    }

    .count {
      color: #888;
      font-size: 14px;
      margin-bottom: 24px;
    }

    /* --- Form --- */
    .add-form {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .add-form input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .add-form input:focus {
      border-color: #f5576c;
    }

    .add-form button {
      padding: 12px 20px;
      background: #f5576c;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .add-form button:hover { background: #e04460; }

    /* --- List --- */
    .list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .list li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      background: #fff5f6;
      border-radius: 12px;
      font-size: 15px;
      color: #333;
      animation: slideIn 0.25s ease;
    }

    .list li .emoji { margin-right: 10px; font-size: 18px; }

    .list li button {
      background: none;
      border: none;
      color: #ccc;
      font-size: 18px;
      cursor: pointer;
      padding: 0 4px;
      transition: color 0.2s;
    }

    .list li button:hover { color: #e74c3c; }

    .empty {
      text-align: center;
      color: #bbb;
      padding: 32px 0;
      font-size: 15px;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* --- Code hint --- */
    .code-hint {
      margin-top: 24px;
      padding: 16px;
      background: #fff0f2;
      border-radius: 12px;
      font-size: 12px;
      color: #666;
      line-height: 1.6;
    }
    .code-hint strong { color: #f5576c; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Load React from CDN (no setup needed!) -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const emojis = ['⭐', '🎵', '🍕', '🎮', '📚', '🏀', '🎨', '🌈', '🐶', '🚀'];

    // ==============================
    //  A COMPONENT = a reusable piece
    // ==============================
    function FavoriteItem({ name, emoji, onRemove }) {
      return (
        <li>
          <span>
            <span className="emoji">{emoji}</span>
            {name}
          </span>
          <button onClick={onRemove}>✕</button>
        </li>
      );
    }

    // ==============================
    //  THE MAIN APP COMPONENT
    // ==============================
    function App() {
      // "state" = data that React watches for us
      const [favorites, setFavorites] = React.useState([]);
      const [inputValue, setInputValue] = React.useState('');

      // Add a favorite — just update the data, React re-renders automatically!
      function addFavorite(e) {
        e.preventDefault();
        const name = inputValue.trim();
        if (!name) return;

        const randomEmoji = emojis[Math.floor(Math.random() * emojis.length)];
        setFavorites([...favorites, { name, emoji: randomEmoji }]);
        setInputValue('');
        // No manual DOM updates needed! React handles it!
      }

      // Remove a favorite — just update the data!
      function removeFavorite(index) {
        setFavorites(favorites.filter((_, i) => i !== index));
        // Again, no manual DOM updates!
      }

      // ==============================
      //  JUST DESCRIBE WHAT IT LOOKS LIKE
      //  React figures out the rest!
      // ==============================
      return (
        <div className="app">
          <span className="badge">REACT</span>
          <h1>My Favorite Things</h1>
          <p className="count">
            {favorites.length} item{favorites.length !== 1 && 's'}
          </p>

          <form className="add-form" onSubmit={addFavorite}>
            <input
              type="text"
              placeholder="Add something you love..."
              value={inputValue}
              onChange={(e) => setInputValue(e.target.value)}
            />
            <button type="submit">Add</button>
          </form>

          <ul className="list">
            {/* Loop through data — React creates elements for us */}
            {favorites.map((fav, index) => (
              <FavoriteItem
                key={index}
                name={fav.name}
                emoji={fav.emoji}
                onRemove={() => removeFavorite(index)}
              />
            ))}
          </ul>

          {favorites.length === 0 && (
            <p className="empty">No favorites yet. Add one!</p>
          )}

          <div className="code-hint">
            <strong>How React works:</strong><br />
            We just describe what the page should look like.
            When data changes with <strong>useState</strong>,
            React automatically updates only the parts that changed.
            No <strong>getElementById</strong>. No <strong>createElement</strong>.
            Just data in, UI out!
          </div>
        </div>
      );
    }

    // Start the app
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
