<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Frontend Mentor | Fylo data storage component</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <!-- <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style> -->
  </head>
  <body>
    <div class="cointainer">
      <div class="icon-cointainer">
        <img src="./images/logo.svg" alt="logo" />
        <div class="icons">
          <img
            src="./images/icon-document.svg"
            alt="document icon"
            class="iconsc"
          />
          <img
            src="./images/icon-folder.svg"
            alt="folder icon"
            class="iconsc"
          />
          <img
            src="./images/icon-upload.svg"
            alt="upload icon"
            class="iconsc"
          />
        </div>
      </div>
      <div class="storage-info">
        <p>You’ve used <strong>815 GB</strong> of your storage</p>
        <div class="progress-bar">
          <div class="progress">
            <div class="circle"></div>
          </div>
        </div>
        <div class="usedbox">
          <span>185</span>
          <p>gb left</p>
        </div>
        <div class="triangle"></div>
        <div class="storagelimit">
          <div class="mingb">0 GB</div>
          <div class="maxgb">1000 GB</div>
        </div>
      </div>
    </div>

    <!-- <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </div> -->
  </body>
</html>
