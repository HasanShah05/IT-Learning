<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <title>Frontend Mentor | NFT preview card component</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <!-- <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style> -->
  </head>
  <body>
    <div class="card-cointainer">
      <div class="bitcoin-image">
        <img src="./images/image-equilibrium.jpg" alt="bitcoinimg" />
        <div class="overlay">
          <img src="./images/icon-view.svg" alt="viewimg" />
        </div>
      </div>
      <div class="nft-detail">
        <p class="nft-name">Equilibrium #3429</p>
        <p class="nft-info">
          Our Equilibrium collection promotes balance and calm.
        </p>

        <p class="nft-value">
          <span class="volume"
            ><img src="./images/icon-ethereum.svg" alt="ethsvg" />0.041
            ETH</span
          ><span class="days">
            <img src="./images/icon-clock.svg" alt="clocksvg" />3 days
            left</span
          >
        </p>
        <div class="creator-info">
          <img
            src="./images/image-avatar.png"
            alt="proflepic"
            class="creatorpic"
          />
          <p class="creator-name">
            <span>Creation of</span> <a href="" target="_blank">Jules Wyvern</a>
          </p>
        </div>
      </div>
    </div>

    <!-- <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </div> -->
  </body>
</html>
