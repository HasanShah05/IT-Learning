<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <title>Frontend Mentor | Profile card component</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <!-- <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style> -->
  </head>

  <body>
    <!-- <div class="topimg">
      <img src="./images/bg-pattern-top.svg" alt="topbg"/>
    </div> -->
    <!-- <div class="bottomimg">
      <img src="./images/bg-pattern-bottom.svg" alt="bottombg" />
    </div> -->
    <div class="main-card">
      <div class="card-img">
        <img src="./images/bg-pattern-card.svg" alt="cardbg" />
      </div>
      <img
        src="./images/image-victor.jpg"
        alt="profilepic"
        class="profileimg"
      />
      <div class="profile-info">
        <h3 class="name">
          Victor Crest
          <span class="age">26</span>
        </h3>
      </div>
      <p class="place">London</p>
      <hr />
      <div class="stats">
        <div class="stat-info">
          <p class="no">80K</p>
          <p class="stat-name">Followers</p>
        </div>
        <div class="stat-info">
          <p class="no">803K</p>
          <p class="stat-name">Likes</p>
        </div>
        <div class="stat-info">
          <p class="no">1.4K</p>
          <p class="stat-name">Photos</p>
        </div>
      </div>
    </div>

  </div> -->
  </body>
</html>
