<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans+Code:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />

    <title>Frontend Mentor | Results summary component</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <!-- <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style> -->
  </head>
  <body>
    <div class="cointainer">
      <div class="result">
        <h3>Your Result</h3>
        <p class="resultscore">
          <span>76</span>
          of 100
        </p>
        <div>
          <p class="resultrank">Great</p>
          <p class="para">
            You scored higher than 65% of the people who have taken these tests.
          </p>
        </div>
      </div>

      <div class="summary">
        <h3>Summary</h3>
        <ul class="stats">
          <li
            class="reaction-item"
            style="background-color: hsla(0, 100%, 91%, 0.226)"
          >
            <div class="category">
              <img
                src="./assets/images/icon-reaction.svg"
                class="icon"
                alt="reactionimg"
              /><span>Reaction</span>
            </div>
            <div class="score"><strong>80</strong> / 100</div>
          </li>
          <li
            class="memory-item"
            style="background-color: hsla(39, 76%, 82%, 0.235)"
          >
            <div class="category">
              <img
                src="./assets/images/icon-memory.svg"
                class="icon"
                alt="memoryimg"
              /><span>Memory</span>
            </div>
            <div class="score"><strong>92 </strong>/ 100</div>
          </li>
          <li
            class="verbal-item"
            style="background-color: hsla(166, 100%, 89%, 0.363)"
          >
            <div class="category">
              <img
                src="./assets/images/icon-verbal.svg"
                class="icon"
                alt="verbalimg"
              /><span>Verbal</span>
            </div>
            <div class="score"><strong>61</strong> / 100</div>
          </li>
          <li
            class="visual-item"
            style="background-color: hsla(233, 97%, 87%, 0.258)"
          >
            <div class="category">
              <img
                src="./assets/images/icon-visual.svg"
                class="icon"
                alt="visualimg"
              /><span>Visual</span>
            </div>
            <div class="score"><strong>72</strong> / 100</div>
          </li>
        </ul>
        <button class="btn">Continue</button>
      </div>
    </div>

  </div> -->
  </body>
</html>
