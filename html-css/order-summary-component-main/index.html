<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Order summary card</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <!-- <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style> -->
  </head>
  <body>
    <img
      src="./images/pattern-background-desktop.svg"
      alt="desjtopbg"
      class="desktopbgimg"
    />
    <img
      src="./images/pattern-background-mobile.svg"
      alt="mobilebg"
      class="mobilebgimg"
    />
    <div class="card-cointainer">
      <div class="imagebox">
        <img src="./images/illustration-hero.svg" alt="" />
      </div>
      <div class="order-summary">
        <h2 class="title">Order Summary</h2>
        <p class="order-detail">
          You can now listen to millions of songs, audiobooks, and podcasts on
          any device anywhere you like!
        </p>
        <div class="product-info">
          <div class="musicicon">
            <img src="./images/icon-music.svg" alt="icon" />
          </div>
          <div class="plan-detail">
            <p class="validity">Annual Plan</p>
            <p class="price">$59.99/year</p>
          </div>
          <a href="#" class="change-link">Change</a>
        </div>
        <button class="btn">Proceed to Payment</button>
        <a href="#" class="Cancel-link">Cancel Order</a>
      </div>
    </div>

    <!-- <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </div> -->
  </body>
</html>
